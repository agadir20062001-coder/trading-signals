services:
  - type: worker
    name: trading-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python telegram_bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: WATCH_STOCKS
        value: NVDA,AAPL,TSLA,AMZN,MSFT
      - key: WATCH_CRYPTO
        value: BTC/USDT,ETH/USDT,SOL/USDT
      - key: WATCH_FOREX
        value: EURUSD=X,GBPUSD=X,USDJPY=X
      - key: WATCH_COMMODITIES
        value: GC=F,CL=F,SI=F
      - key: WATCH_INDICES
        value: ^GSPC,^DJI,^IXIC
      - key: CONSENSUS_THRESHOLD
        value: "4"
      - key: MEMORY_REPO_NAME
        sync: false
      - key: MEMORY_REPO_TOKEN
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: EMAIL_SMTP_HOST
        value: smtp.gmail.com
      - key: EMAIL_SMTP_PORT
        value: "587"
